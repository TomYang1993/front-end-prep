name: Finalize Production Release

on:
  push:
    branches: [production]

permissions:
  contents: write
  pull-requests: read

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: production
          fetch-depth: 0

      - name: Validate production version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "package.json version must be semver like 0.3.0, got: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}-prod" >> "$GITHUB_OUTPUT"

      - name: Fetch tags
        run: git fetch origin --tags

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Tag production commit
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          HEAD_SHA="$(git rev-parse HEAD)"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_SHA="$(git rev-list -n 1 "$TAG")"
            if [ "$TAG_SHA" = "$HEAD_SHA" ]; then
              echo "$TAG already points at this production commit"
              exit 0
            fi
            echo "$TAG already exists at $TAG_SHA, but production is $HEAD_SHA" >&2
            echo "Bump package.json before the next production release." >&2
            exit 1
          fi

          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release $TAG already exists"
            exit 0
          fi

          BODY_FILE="$RUNNER_TEMP/release-notes.md"
          PR_NUMBER="$(gh pr list --base production --state merged --limit 1 --json number --jq '.[0].number // ""')"
          PR_TITLE="$(gh pr list --base production --state merged --limit 1 --json title --jq '.[0].title // ""')"
          PR_URL="$(gh pr list --base production --state merged --limit 1 --json url --jq '.[0].url // ""')"
          PR_BODY="$(gh pr list --base production --state merged --limit 1 --json body --jq '.[0].body // ""')"

          {
            if [ -n "$PR_NUMBER" ]; then
              echo "Production release from #${PR_NUMBER}: ${PR_TITLE}"
              echo
              echo "$PR_URL"
              echo
            fi
            if [ -n "$PR_BODY" ]; then
              echo "$PR_BODY"
              echo
            fi
          } > "$BODY_FILE"

          gh release create "$TAG" \
            --verify-tag \
            --generate-notes \
            --notes-file "$BODY_FILE" \
            --title "Production $TAG"
